name: Validate and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUE
        uses: cue-lang/setup-cue@v1
        with:
          version: v0.12.0

      - name: Validate site.yaml
        run: cue vet schemas/site.cue -d '#Site' content/site.yaml

      - name: Validate admins
        run: cue vet schemas/admin.cue schemas/site.cue -d '#Admin' content/admins/*.yaml

      - name: Validate activities
        run: cue vet schemas/activity.cue -d '#Activity' content/activities/*.yaml

      - name: Validate partners
        run: cue vet schemas/partner.cue -d '#Partner' content/partners/*.yaml

      - name: Validate meetups
        run: cue vet schemas/meetup.cue -d '#Meetup' content/meetups/*/meta.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
